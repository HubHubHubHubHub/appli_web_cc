name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install beautifulsoup4
      - name: Validate V2 schema
        run: cd outil_python && python3 validate_v2.py --data ../static/data.json --phrases ../static/phrases.json
